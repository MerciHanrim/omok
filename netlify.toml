# Netlify 설정 — 정적 사이트 (빌드 없음)
# COOP/COEP 헤더로 cross-origin isolation 활성화 → SharedArrayBuffer(멀티스레드 WASM 엔진)에 필요.
# _headers 파일과 동일 효과. 둘 중 하나만 있어도 되지만, 명시성을 위해 함께 둠.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
